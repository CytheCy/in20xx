<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 20xx Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080d0b;
    --bg2: #0d1410;
    --bg3: #111a16;
    --cyan: #3fffd4;
    --cyan-dim: #1ecba8;
    --cyan-faint: rgba(63,255,212,0.08);
    --cyan-border: rgba(63,255,212,0.25);
    --text: #c8e0d8;
    --text-dim: #5a7a6e;
    --text-mid: #8aada0;
    --white: #e8f5f0;
    --red: #ff4a6e;
    --orange: #ff8c42;
    --purple: #b47dff;
    --yellow: #ffe066;
    --green: #3fffd4;
    --timeline-height: 2px;
    --node-size: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 48px;
    background: #0a0f0d;
    border-bottom: 1px solid rgba(63,255,212,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    flex-shrink: 0;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  .nav-logo span { color: var(--cyan); }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .nav-links a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-mid);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-subscribe {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: var(--cyan);
    color: #080d0b;
    border: none;
    padding: 7px 18px;
    cursor: pointer;
    border-radius: 2px;
    font-weight: 700;
    transition: background 0.2s;
    text-decoration: none;
  }
  .nav-subscribe:hover { background: #5fffde; }
  header {
    padding: 16px 56px 0;
    position: relative;
    flex-shrink: 0;
  }

  .label-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--cyan);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .label-tag::after {
    content: '';
    flex: 0 0 60px;
    height: 1px;
    background: var(--cyan-dim);
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px, 3.5vw, 56px);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 10px;
  }
  h1 span { color: var(--cyan); }

  .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-mid);
    max-width: 540px;
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .subtitle em { font-style: italic; color: var(--text); }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
    padding: 0 56px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-mid);
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--cyan-border);
    color: var(--white);
    background: var(--cyan-faint);
  }
  .filter-btn.active { border-color: var(--cyan); }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    padding: 0 56px;
    margin-bottom: 2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .scroll-hint::before {
    content: '← →';
    color: var(--cyan-dim);
  }

  /* ── TIMELINE CONTAINER ── */
  .timeline-wrapper {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 56px 0;
    cursor: grab;
    scrollbar-width: thin;
    scrollbar-color: var(--cyan-dim) var(--bg2);
  }
  .timeline-wrapper:active { cursor: grabbing; }
  .timeline-wrapper::-webkit-scrollbar { height: 4px; }
  .timeline-wrapper::-webkit-scrollbar-track { background: var(--bg2); }
  .timeline-wrapper::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

  .timeline-inner {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 0;
    padding-top: 12px;
    padding-bottom: 20px;
    height: 100%;
    overflow: visible;
  }

  /* ── HORIZONTAL LINE ── */
  .timeline-line {
    position: absolute;
    bottom: calc(60px + var(--node-size)/2);
    left: 0;
    right: 0;
    height: var(--timeline-height);
    background: linear-gradient(90deg, transparent 0%, var(--cyan-dim) 5%, var(--cyan-dim) 95%, transparent 100%);
    opacity: 0.35;
    pointer-events: none;
  }
  .timeline-line-glow {
    position: absolute;
    bottom: calc(60px + var(--node-size)/2 - 1px);
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, var(--cyan) 5%, var(--cyan) 95%, transparent 100%);
    opacity: 0.08;
    pointer-events: none;
    filter: blur(3px);
  }

  .date-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 160px;
    position: relative;
    flex-shrink: 0;
    justify-content: flex-end;
    overflow: visible;
  }

  .cards-above {
    display: flex;
    flex-direction: column-reverse;
    justify-content: flex-start;
    align-items: center;
    gap: 6px;
    padding-bottom: 10px;
    width: 150px;
  }

  /* Node */
  .node {
    width: var(--node-size);
    height: var(--node-size);
    border-radius: 50%;
    border: 2px solid var(--cyan-dim);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.4;
    position: relative;
    flex-shrink: 0;
    z-index: 2;
    transition: all 0.25s;
  }
  .node.q1-marker span:first-child {
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
  }
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--cyan-border);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .date-col:hover .node::before { opacity: 1; }

  /* Q1 vertical lines — fixed, full viewport height */
  .q1-line {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(163, 255, 180, 0.28);
    pointer-events: none;
    z-index: 0;
  }

  /* Cards below */
  .cards-below {
    padding-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    width: 150px;
  }

  /* ── EVENT CARD ── */
  .event-card {
    width: 144px;
    padding: 8px 10px;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    z-index: 51;
  }
  .event-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-color, var(--cyan));
    opacity: 0.7;
  }
  .event-card:hover {
    border-color: var(--card-color, var(--cyan));
    background: var(--bg3);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .event-card.hidden { display: none; }

  .event-card .card-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--white);
    letter-spacing: 0.04em;
    line-height: 1.4;
    text-transform: uppercase;
  }
  .event-card .card-cat {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,13,11,0.88);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--cyan-border);
    border-radius: 4px;
    padding: 40px 44px;
    max-width: 520px;
    width: 90vw;
    position: relative;
    transform: translateY(12px);
    transition: transform 0.25s;
    box-shadow: 0 0 60px rgba(63,255,212,0.06), 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .modal-cat {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 3px 8px;
    border-radius: 2px;
    margin-bottom: 24px;
  }
  .modal-desc {
    font-size: 15px;
    font-weight: 300;
    color: var(--text-mid);
    line-height: 1.8;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--cyan); }

  .modal-divider {
    height: 1px;
    background: var(--cyan-border);
    margin: 24px 0;
  }

  /* color strip at top of modal */
  .modal-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 4px 4px 0 0;
  }

  /* ── SWEEPING LINE ── */
  .sweep-line {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(63, 255, 212, 0.15) 15%,
      rgba(63, 255, 212, 0.7) 50%,
      rgba(63, 255, 212, 0.15) 85%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 50;
    filter: blur(0.5px);
    animation: sweep 10s linear infinite;
  }
  .sweep-line::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: -6px; right: -6px;
    background: inherit;
    filter: blur(6px);
    opacity: 0.4;
  }
  @keyframes sweep {
    0%   { left: -4px; opacity: 0; }
    2%   { opacity: 1; }
    98%  { opacity: 1; }
    100% { left: 100vw; opacity: 0; }
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── CORNER DECORATION ── */
  .corner-grid {
    position: absolute;
    top: 40px; right: 56px;
    width: 120px; height: 80px;
    opacity: 0.12;
    pointer-events: none;
  }

  /* responsive */
  @media (max-width: 600px) {
    header { padding: 28px 24px 0; }
    .filters, .stats-bar, .scroll-hint { padding: 0 24px; }
    .timeline-wrapper { padding: 0 24px 60px; }
    h1 { font-size: 40px; }
  }
</style>
</head>
<body>

<div class="sweep-line"></div>

<header>
  <!-- Corner SVG decoration -->
  <svg class="corner-grid" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#3fffd4" stroke-width="1"/>
    <line x1="0" y1="20" x2="120" y2="20" stroke="#3fffd4" stroke-width="1"/>

  <div class="label-tag">Speculative Master Timeline</div>

  </p>
</header>

<div class="scroll-hint">DRAG OR SCROLL TO NAVIGATE</div>

    <div class="timeline-line"></div>

<script>
// ── CSV DATA ────────────────────────────────────────────────
// To add events: edit this CSV string (keep the header row).
// Events loaded from Events.csv

// ── CATEGORY COLORS ─────────────────────────────────────────
const CAT_COLORS = {
  'AI':              '#3fffd4',
  'Security':        '#ff4a6e',
  'Energy':          '#ffe066',
  'Transport':       '#ff8c42',
  'Health':          '#a8ff78',
  'VR':              '#b47dff',
  'Crime':           '#ff4a6e',
  'Military':        '#ff6b35',
  'Consumer Tech':   '#3fb8ff',
  'Wearable Tech':   '#b47dff',
  'Environment':     '#a8ff78',
  'Social':          '#ff78c4',
  'Education':       '#ffe066',
  'Agriculture':     '#a8ff78',
  'Media':           '#3fb8ff',
  'Fintech':         '#3fffd4',
  'Robotics':        '#ff8c42',
  'Communication':   '#3fb8ff',
  'Entertainment':   '#ff78c4',
  'Urban Living':    '#8ab4f8',
  'Politics':        '#ff4a6e',
  'Personal Safety': '#ff8c42',
  'Mobile App':      '#3fb8ff',
  'Mapping':         '#ffe066',
  'Display Tech':    '#b47dff',
  'Bioethics':       '#ff4a6e',
};

function getCatColor(category) {
  const parts = category.split('/').map(s => s.trim());
  for (const p of parts) {
    if (CAT_COLORS[p]) return CAT_COLORS[p];
  }
  return '#3fffd4';
}

// ── PARSE CSV ───────────────────────────────────────────────
function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (cols[i] || '').trim());
    return obj;
  }).filter(r => r.Date && r.Title);
}

// ── EXTRACT UNIQUE CATEGORIES ────────────────────────────────
function extractCategories(events) {
  const set = new Set();
  events.forEach(e => {
    e.Category.split('/').forEach(c => set.add(c.trim()));
  });
  return [...set].sort();
}

// ── GROUP BY DATE ────────────────────────────────────────────
function groupByDate(events) {
  const map = {};
  events.forEach(e => {
    if (!map[e.Date]) map[e.Date] = [];
    map[e.Date].push(e);
  });
  // Sort keys
  const sorted = Object.keys(map).sort((a, b) => {
    const [ya, qa] = a.split(' ');
    const [yb, qb] = b.split(' ');
    return ya !== yb ? ya.localeCompare(yb) : (qa||'').localeCompare(qb||'');
  });
  return sorted.map(d => ({ date: d, events: map[d] }));
}

// ── STATE ────────────────────────────────────────────────────
fetch('Events.csv')
  .then(r => r.text())
  .then(CSV_DATA => {
    const events = parseCSV(CSV_DATA);
const allCategories = extractCategories(events);
let activeFilters = new Set(); // empty = show all

// ── BUILD TIMELINE ───────────────────────────────────────────
const inner = document.getElementById('timeline-inner');
const grouped = groupByDate(events);

// alternating: odd-indexed dates put cards above, even below
grouped.forEach((group, gi) => {
  const col = document.createElement('div');
  col.className = 'date-col';

  const above = document.createElement('div');
  above.className = 'cards-above';

  const node = document.createElement('div');
  node.className = 'node';
  const [yr, qt] = group.date.split(' ');
  node.innerHTML = `<span>${yr}</span><span>${qt || ''}</span>`;
  if (qt === 'Q1') node.classList.add('q1-marker');

  const below = document.createElement('div');
  below.className = 'cards-below';

  // All cards above the node
  group.events.forEach(ev => {
    above.appendChild(buildCard(ev));
  });

  col.appendChild(above);
  col.appendChild(node);
  col.appendChild(below);
  inner.appendChild(col);
});

// ── Q1 VERTICAL LINES ────────────────────────────────────────
// Collect all Q1 nodes, create a fixed-position line per node,
// and keep them aligned as the user scrolls horizontally.
const q1Nodes = [];
document.querySelectorAll('.node').forEach(node => {
  if (node.querySelector('span:last-child')?.textContent === 'Q1') {
    const line = document.createElement('div');
    line.className = 'q1-line';
    document.body.appendChild(line);
    q1Nodes.push({ node, line });
  }
});

function updateQ1Lines() {
  q1Nodes.forEach(({ node, line }) => {
    const rect = node.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    line.style.left = cx + 'px';
  });
}

updateQ1Lines();
window.addEventListener('scroll', updateQ1Lines);
document.getElementById('timeline-wrapper').addEventListener('scroll', updateQ1Lines);
window.addEventListener('resize', updateQ1Lines);

function buildCard(ev) {
  const card = document.createElement('div');
  card.className = 'event-card';
  const color = getCatColor(ev.Category);
  card.style.setProperty('--card-color', color);
  const catParts = ev.Category.split('/').map(c => c.trim());
  card.dataset.cats = catParts.join('|');

  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = ev.Title;

  const cat = document.createElement('div');
  cat.className = 'card-cat';
  cat.textContent = ev.Category;

  card.appendChild(title);
  card.appendChild(cat);

  card.addEventListener('click', () => openModal(ev, color));
  return card;
}

// ── MODAL ────────────────────────────────────────────────────
const overlay = document.getElementById('modal');
const modalClose = document.getElementById('modal-close');

function openModal(ev, color) {
  document.getElementById('modal-date').textContent = ev.Date;
  document.getElementById('modal-title').textContent = ev.Title;
  document.getElementById('modal-cat').textContent = ev.Category;
  document.getElementById('modal-desc').textContent = ev.Description;
  document.getElementById('modal-strip').style.background = color;
  overlay.classList.add('open');
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() { overlay.classList.remove('open'); }

// ── DRAG SCROLL ──────────────────────────────────────────────
const wrapper = document.getElementById('timeline-wrapper');
let isDragging = false, startX, scrollLeft;

wrapper.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.pageX - wrapper.offsetLeft;
  scrollLeft = wrapper.scrollLeft;
  wrapper.style.cursor = 'grabbing';
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  wrapper.style.cursor = 'grab';
});
wrapper.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const x = e.pageX - wrapper.offsetLeft;
  wrapper.scrollLeft = scrollLeft - (x - startX);
});

// Touch support
wrapper.addEventListener('touchstart', e => {
  startX = e.touches[0].pageX - wrapper.offsetLeft;
  scrollLeft = wrapper.scrollLeft;
}, { passive: true });
wrapper.addEventListener('touchmove', e => {
  const x = e.touches[0].pageX - wrapper.offsetLeft;
  wrapper.scrollLeft = scrollLeft - (x - startX);
}, { passive: true });
  }); // end fetch
</script>
